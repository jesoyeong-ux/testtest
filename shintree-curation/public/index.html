<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- PWA / 홈 화면 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="신트리">
  <meta name="theme-color" content="#0064FF">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>신트리 도서관 큐레이션</title>

  <style>
    /* ══ Reset ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; }
    button { font-family: inherit; }

    /* ══ Base ═══════════════════════════════════════════ */
    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #F7F8FA;
      color: #191F28;
      min-height: 100vh;
      padding: 20px 16px 100px;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
    }
    .container { max-width: 480px; margin: 0 auto; }

    /* ══ 텍스트 헤더 ════════════════════════════════════ */
    .page-header { margin-bottom: 28px; padding-top: 8px; }
    .header-vol {
      font-size: 10.5px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: #8B95A1; margin-bottom: 8px;
    }
    .header-concept {
      font-size: 24px; font-weight: 800; line-height: 1.3;
      color: #191F28; margin-bottom: 10px; letter-spacing: -.02em;
    }
    .concept-emoji { display: inline-block; }
    .header-desc {
      font-size: 13px; color: #4E5968; line-height: 1.75;
      white-space: pre-line;
    }

    /* ══ 대출 요약 바 ════════════════════════════════════ */
    .borrowed-bar {
      display: none;
      background: #E8FAF0;
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #1A7F4B;
      font-weight: 600;
      align-items: center;
      gap: 8px;
      line-height: 1.5;
    }
    .borrowed-bar.visible { display: flex; }

    /* ══ 섹션 레이블 ══════════════════════════════════════ */
    .section-label {
      display:flex;align-items:center;gap:7px;
      font-size:11px;font-weight:700;color:#8B95A1;
      letter-spacing:.1em;text-transform:uppercase;
      margin:28px 0 10px;padding:0 2px;
    }
    .bonus-pill {
      font-size:10px;font-weight:800;
      background:linear-gradient(135deg,#FF6B35,#FF8E53);
      color:#fff;padding:2px 8px;border-radius:20px;letter-spacing:.06em;
    }

    /* ══ 책 카드 ══════════════════════════════════════════ */
    .book-card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 2px 12px rgba(0,0,0,.05);
      transition: opacity 0.3s ease, transform 0.2s ease;
    }
    .book-card.borrowed {
      opacity: 0.32;
      filter: grayscale(55%);
      position: relative;
    }
    /* 대출완료 스탬프 오버레이 */
    .book-card.borrowed .book-title::after {
      content: '';
      display: inline-block;
      width: 100%; height: 2px;
      background: #8B95A1;
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
    }
    .book-card.borrowed .book-title {
      position: relative;
      text-decoration: line-through;
      text-decoration-color: #8B95A1;
      text-decoration-thickness: 2px;
    }

    .book-top { display:flex;gap:14px;margin-bottom:16px;align-items:flex-start; }
    .book-cover {
      width:68px;height:96px;border-radius:8px;object-fit:cover;flex-shrink:0;
      box-shadow:0 4px 12px rgba(0,0,0,.14);
    }
    .book-cover-placeholder {
      width:68px;height:96px;border-radius:8px;background:#EBF3FF;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:22px;
    }
    .book-meta { flex:1;padding-top:2px;min-width:0; }

    .book-badge {
      display:inline-block;font-size:10.5px;font-weight:700;
      padding:3px 8px;border-radius:20px;margin-bottom:8px;
    }
    .badge-green  { background:#E8FAF0;color:#1A7F4B; }
    .badge-yellow { background:#FFF8E1;color:#9A6A00; }
    .badge-blue   { background:#E8F1FF;color:#0064FF;text-decoration:none; }
    .badge-blue:hover { background:#D6E8FF; }
    .badge-gray   { background:#F2F4F6;color:#8B95A1; }

    .book-title  { font-size:15px;font-weight:800;color:#191F28;line-height:1.35;margin-bottom:3px; }
    .book-author { font-size:12px;color:#8B95A1;font-weight:500; }

    /* 훅 문장 */
    .hook-sentence {
      font-size:13.5px;font-style:italic;color:#191F28;
      line-height:1.65;padding:12px 14px;
      background:#F0F6FF;border-left:3px solid #0064FF;
      border-radius:0 10px 10px 0;margin-bottom:16px;
    }

    /* Q&A */
    .qa-list { display:flex;flex-direction:column;gap:10px;margin-bottom:14px; }
    .qa-item  { display:flex;flex-direction:column;gap:6px; }
    .qa-q {
      font-size:13px;background:#F2F4F6;
      border-radius:14px 14px 14px 4px;
      padding:10px 13px;color:#3D4A5C;
      align-self:flex-start;max-width:88%;line-height:1.5;
    }
    .qa-a {
      font-size:13px;background:#0064FF;color:#fff;
      border-radius:14px 14px 4px 14px;
      padding:10px 13px;align-self:flex-end;
      max-width:88%;line-height:1.55;
    }

    /* 태그 */
    .tag-list { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px; }
    .tag { font-size:11px;color:#0064FF;background:#F0F6FF;padding:4px 10px;border-radius:20px;font-weight:600; }

    /* ══ 책 소개 토글 ══════════════════════════════════ */
    .desc-toggle {
      display:flex;align-items:center;gap:6px;
      width:100%;background:none;border:none;padding:0;margin-bottom:12px;
      color:#8B95A1;font-size:12px;font-weight:600;cursor:pointer;
      -webkit-tap-highlight-color:transparent;text-align:left;
    }
    .desc-toggle .desc-arrow { transition:transform 0.2s;display:inline-block; }
    .desc-toggle.open .desc-arrow { transform:rotate(180deg); }
    .book-desc-content {
      display:none;font-size:13px;color:#4E5968;line-height:1.7;
      background:#F8FAFC;border-radius:10px;padding:12px 14px;
      margin-bottom:12px;white-space:pre-wrap;word-break:keep-all;
    }
    .book-desc-content.visible { display:block; }

    /* ══ 대출 버튼 ════════════════════════════════════════ */
    .borrow-btn {
      width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
      padding:11px 14px;border-radius:12px;
      border:1.5px solid #E2E8F0;background:transparent;
      color:#8B95A1;font-size:13px;font-weight:600;
      cursor:pointer;transition:all 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .borrow-btn:active { transform:scale(0.97); }
    .borrow-btn.checked {
      background:#E8FAF0;border-color:#34C759;color:#1A7F4B;
    }

    /* ══ 히스토리 버튼 ══════════════════════════════════ */
    .history-btn {
      background:none;border:none;cursor:pointer;
      font-size:20px;padding:4px;opacity:0.5;
      -webkit-tap-highlight-color:transparent;flex-shrink:0;margin-top:2px;
    }
    .history-btn:active { opacity:1; }

    /* ══ 바텀시트 공통 ══════════════════════════════════ */
    .sheet-backdrop {
      position:fixed;inset:0;z-index:300;
      background:rgba(0,0,0,.45);
      opacity:0;pointer-events:none;transition:opacity 0.25s;
    }
    .sheet-backdrop.open { opacity:1;pointer-events:all; }
    .sheet {
      position:fixed;bottom:0;left:50%;
      transform:translateX(-50%) translateY(100%);
      width:100%;max-width:480px;z-index:301;
      background:#fff;border-radius:24px 24px 0 0;
      padding:0 0 calc(20px + env(safe-area-inset-bottom));
      transition:transform 0.3s cubic-bezier(.32,.72,0,1);
      max-height:85vh;overflow:hidden;display:flex;flex-direction:column;
    }
    .sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-handle {
      width:36px;height:4px;border-radius:2px;
      background:#E2E8F0;margin:12px auto 0;flex-shrink:0;
    }
    .sheet-title {
      font-size:16px;font-weight:800;color:#191F28;
      padding:14px 20px 10px;flex-shrink:0;
    }
    .sheet-body { overflow-y:auto;padding:0 16px 16px;flex:1; }

    /* ══ 히스토리 아이템 ═════════════════════════════════ */
    .history-item {
      display:flex;align-items:center;gap:12px;
      padding:12px 4px;border-bottom:1px solid #F2F4F6;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      transition:background 0.15s;border-radius:8px;
    }
    .history-item:last-child { border-bottom:none; }
    .history-item:active { background:#F7F8FA; }
    .history-item-emoji { font-size:22px;flex-shrink:0; }
    .history-item-info { flex:1;min-width:0; }
    .history-item-vol  { font-size:10.5px;color:#8B95A1;font-weight:700;letter-spacing:.08em; }
    .history-item-title { font-size:14px;font-weight:700;color:#191F28;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .history-item-meta { font-size:11px;color:#8B95A1; }
    .history-item-arrow { color:#C9CDD2;font-size:16px;flex-shrink:0; }
    .history-item.active .history-item-vol   { color:#0064FF; }
    .history-item.active .history-item-title { color:#0064FF; }

    /* ══ 도서관 확인 시트 ════════════════════════════════ */
    .lib-check-row {
      display:flex;align-items:center;gap:12px;
      padding:14px 4px;border-bottom:1px solid #F2F4F6;
    }
    .lib-check-row:last-of-type { border-bottom:none; }
    .lib-check-label { flex:1;font-size:14px;color:#191F28;font-weight:600; }
    .lib-check-status { font-size:13px;font-weight:700; }
    .lib-check-status.green   { color:#1A7F4B; }
    .lib-check-status.yellow  { color:#9A6A00; }
    .lib-check-status.gray    { color:#8B95A1; }
    .lib-sheet-cta {
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:16px;padding:14px;border-radius:14px;
      background:#0064FF;color:#fff;
      font-size:14px;font-weight:700;text-decoration:none;
    }

    /* ══ 도서관 확인 버튼 (카드 내) ═══════════════════════ */
    .lib-btn {
      display:flex;align-items:center;justify-content:center;gap:5px;
      width:100%;padding:10px 14px;border-radius:12px;
      border:1.5px solid #E2E8F0;background:transparent;
      color:#4E5968;font-size:13px;font-weight:600;
      cursor:pointer;transition:background 0.15s;margin-bottom:8px;
      -webkit-tap-highlight-color:transparent;
    }
    .lib-btn:active { background:#F2F4F6; }

    /* ══ CTA 버튼 ═════════════════════════════════════════ */
    .library-cta { margin:32px 0 20px; }
    .library-btn {
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;background:#0064FF;color:#fff;
      font-size:15px;font-weight:700;padding:16px;
      border-radius:16px;text-decoration:none;
      box-shadow:0 4px 18px rgba(0,100,255,.26);
    }
    .library-btn-sub { text-align:center;font-size:11px;color:#8B95A1;margin-top:8px; }

    /* ══ 명언 카드 (curator-note 대체) ══════════════════ */
    .quote-card {
      background:#FFFFFF;border-radius:20px;padding:24px;
      text-align:center;
      box-shadow:0 1px 0 rgba(0,0,0,.04), 0 2px 12px rgba(0,0,0,.05);
      animation:fadeUp 0.5s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }
    .quote-label  { font-size:10px;font-weight:700;color:#0064FF;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px; }
    .quote-text   { font-size:15px;color:#191F28;line-height:1.8;font-style:italic;margin-bottom:8px; }
    .quote-author { font-size:12px;color:#8B95A1;font-weight:500; }

    /* ══ 푸터 ════════════════════════════════════════════ */
    .footer { text-align:center;margin-top:20px; }
    .footer-date { font-size:12px;color:#8B95A1;margin-bottom:8px; }
    .footer-tags { font-size:12px;color:#0064FF;line-height:1.9;font-weight:500; }

    /* ══ 새로고침 FAB ═════════════════════════════════════ */
    .fab {
      position:fixed;
      bottom:calc(28px + env(safe-area-inset-bottom));
      right:20px;
      width:56px;height:56px;border-radius:50%;
      background:#0064FF;
      box-shadow:0 4px 20px rgba(0,100,255,.38);
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      z-index:100;
      transition:transform 0.2s,box-shadow 0.2s,opacity 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .fab:active { transform:scale(0.9);box-shadow:0 2px 10px rgba(0,100,255,.3); }
    .fab:disabled { opacity:0.6;cursor:not-allowed; }
    .fab-icon { font-size:22px;color:#fff;display:inline-block;line-height:1;transition:transform 0.3s; }
    .fab.spinning .fab-icon { animation:spin 0.65s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }

    /* ══ AI 생성 상태 토스트 ═══════════════════════════════ */
    .ai-toast {
      position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));right:16px;
      background:rgba(0,0,0,.82);color:#fff;
      font-size:13px;font-weight:500;line-height:1.5;
      padding:10px 16px;border-radius:14px;
      opacity:0;transform:translateY(8px);
      transition:opacity 0.25s,transform 0.25s;
      pointer-events:none;z-index:200;max-width:220px;text-align:center;
    }
    .ai-toast.show { opacity:1;transform:translateY(0); }


    /* ══ 로딩 ════════════════════════════════════════════ */
    .loading {
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:60vh;gap:16px;
      color:#8B95A1;font-size:14px;
    }
    .spinner {
      width:36px;height:36px;
      border:3px solid #E2E8F0;border-top-color:#0064FF;
      border-radius:50%;animation:spin 0.8s linear infinite;
    }

    /* ══ 에러 ════════════════════════════════════════════ */
    .error-card {
      background:#FFF5F5;border-radius:20px;padding:28px;
      text-align:center;color:#C53030;font-size:14px;line-height:1.7;
    }
    .error-card button {
      margin-top:18px;padding:10px 22px;
      background:#0064FF;color:#fff;
      border:none;border-radius:12px;
      font-size:14px;font-weight:600;cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>책 정보를 불러오는 중...</div>
    </div>
  </div>

  <!-- 히스토리 바텀시트 -->
  <div class="sheet-backdrop" id="history-backdrop"></div>
  <div class="sheet" id="history-sheet" role="dialog" aria-label="큐레이션 히스토리">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📋 큐레이션 히스토리</div>
    <div class="sheet-body" id="history-body">
      <div style="color:#8B95A1;font-size:13px;text-align:center;padding:40px 0">불러오는 중...</div>
    </div>
  </div>

  <!-- 도서관 확인 바텀시트 -->
  <div class="sheet-backdrop" id="lib-backdrop"></div>
  <div class="sheet" id="lib-sheet" role="dialog" aria-label="도서관 대출 현황">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🏛️ 도서관 대출 현황</div>
    <div class="sheet-body" id="lib-sheet-body"></div>
  </div>

  <!-- 새로고침 FAB -->
  <button class="fab" id="fab" aria-label="새로고침">
    <span class="fab-icon" id="fab-icon">↻</span>
  </button>

  <!-- AI 생성 상태 토스트 -->
  <div class="ai-toast" id="ai-toast"></div>

  <script>
  /* ─────────────────────────────────────────────────────────
     신트리 큐레이션 — SPA + PWA
  ───────────────────────────────────────────────────────── */

  /* ── Service Worker 등록 ──────────────────────────── */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  /* ── 명언 풀 (36개 — vol 번호로 순환, 매 큐레이션마다 다른 문장) ── */
  const QUOTES = [
    { text: "책을 읽는 것은 타인의 뇌를 빌리는 것이다.", author: "쇼펜하우어" },
    { text: "한 권의 책은 한 번도 가본 적 없는 곳으로 가는 여권이다.", author: "마크 트웨인" },
    { text: "독서는 완성된 사람을 만들고, 토론은 준비된 사람을 만든다.", author: "프랜시스 베이컨" },
    { text: "오늘 읽는 한 줄이, 내일의 나를 다르게 만든다.", author: "" },
    { text: "좋은 책을 읽는 것은 훌륭한 사람들과 대화하는 것이다.", author: "르네 데카르트" },
    { text: "The more that you read, the more things you will know.", author: "Dr. Seuss" },
    { text: "책은 우리에게 소리 없이 말을 건넨다.", author: "볼테르" },
    { text: "삶이 지루해질 때, 책이 새로운 문을 열어준다.", author: "" },
    { text: "오늘의 독자가 내일의 지도자다.", author: "마가렛 풀러" },
    { text: "읽지 않은 책은 열지 않은 문과 같다.", author: "" },
    { text: "책 속에 길이 있다.", author: "" },
    { text: "A reader lives a thousand lives before he dies.", author: "조지 R. R. 마틴" },
    { text: "책은 침묵하지만, 아무것도 침묵하지 않는다.", author: "아나톨 프랑스" },
    { text: "당신이 읽지 않은 책이 바로 당신에게 필요한 책이다.", author: "" },
    { text: "가장 오래된 친구는 책이다.", author: "어니스트 헤밍웨이" },
    { text: "책은 마음의 약이다.", author: "아리스토텔레스" },
    { text: "천 권의 책을 읽어라. 그러면 천 명의 스승을 만나게 된다.", author: "" },
    { text: "책 한 권이 인생을 바꿀 수 있다.", author: "" },
    { text: "독서는 단지 아는 것을 늘리는 게 아니라, 느끼는 법을 배우는 것이다.", author: "" },
    { text: "오늘 책 한 쪽을 읽지 않은 사람은, 내일 한 발짝 뒤처진다.", author: "" },
    { text: "세상에 나쁜 독자는 없다. 아직 맞는 책을 못 만난 독자만 있을 뿐이다.", author: "" },
    { text: "이야기는 끝나도 그 여운은 오래 남는다.", author: "" },
    { text: "좋은 책은 오래된 친구처럼 오래도록 곁에 있어준다.", author: "" },
    { text: "독서는 꿈꾸는 것을 허락한다.", author: "" },
    { text: "문장은 짧아도 생각은 깊게 남는다.", author: "" },
    { text: "읽는 사람이 세상을 바꾼다.", author: "" },
    { text: "좋은 문장을 만나는 것은 좋은 사람을 만나는 것과 같다.", author: "" },
    { text: "No matter how busy you may think you are, you must find time for reading.", author: "데모스테네스" },

  /* vol 번호 기반으로 명언 선택 — 새 큐레이션마다 다른 문장 */
  function getQuoteByVol(vol) {
    const n = parseInt((vol || '').match(/(\d+)\s*$/)?.[1] || '0', 10);
    return QUOTES[n % QUOTES.length];
  }

  /* ── 대출 상태 관리 (localStorage) ──────────────── */
  const STORAGE_KEY = 'shintree_borrowed_v1';

  function loadBorrowed() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
    catch { return new Set(); }
  }
  function saveBorrowed(set) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
  }

  let borrowed = loadBorrowed();

  // 이벤트 위임: 책 소개 토글
  document.addEventListener('click', e => {
    const toggle = e.target.closest('.desc-toggle');
    if (!toggle) return;
    const content = toggle.nextElementSibling;
    if (!content || !content.classList.contains('book-desc-content')) return;
    const isOpen = content.classList.toggle('visible');
    toggle.classList.toggle('open', isOpen);
    toggle.setAttribute('aria-expanded', isOpen);
    toggle.childNodes[0].textContent = isOpen ? '📄 책 소개 닫기 ' : '📄 책 소개 보기 ';
  });

  // 이벤트 위임: 대출 버튼 클릭
  document.addEventListener('click', e => {
    const btn = e.target.closest('.borrow-btn');
    if (!btn) return;
    const card = btn.closest('.book-card');
    if (!card) return;
    const isbn = card.dataset.isbn;
    if (!isbn) return;

    const isBorrowed = borrowed.has(isbn);
    if (isBorrowed) {
      borrowed.delete(isbn);
      card.classList.remove('borrowed');
      btn.classList.remove('checked');
      btn.textContent = '📖 내 대출 목록에 추가';
    } else {
      borrowed.add(isbn);
      card.classList.add('borrowed');
      btn.classList.add('checked');
      btn.textContent = '✅ 내 대출 목록에 있음';
    }
    saveBorrowed(borrowed);
    syncBorrowedBar();
  });

  function syncBorrowedBar() {
    const bar = document.getElementById('borrowed-bar');
    if (!bar) return;
    const n = borrowed.size;
    if (n > 0) {
      bar.className = 'borrowed-bar visible';
      bar.innerHTML = `📌 내 대출 목록에 <strong>${n}권</strong> 추가됨`;
    } else {
      bar.className = 'borrowed-bar';
    }
  }

  /* ── HTML 이스케이프 ──────────────────────────────── */
  function esc(str) {
    if (typeof str !== 'string') return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#x27;');
  }

  function renderBook(book) {
    const isbn       = book.isbn13 || '';
    const isBorrowed = borrowed.has(isbn);
    const avail      = book.availability || {};

    const coverHtml = book.coverUrl
      ? `<img class="book-cover" src="${esc(book.coverUrl)}" alt="${esc(book.title)} 표지" loading="lazy">`
      : `<div class="book-cover-placeholder">📚</div>`;

    // 실제 대출현황 뱃지가 있을 때만 표시 (없으면 비움)
    const badgeHtml = avail.badge
      ? `<span class="book-badge ${BADGE_MAP[avail.color] || 'badge-gray'}">${esc(avail.badge)}</span>`
      : '';

    const qaHtml = (book.qa || []).map(({ q, a }) => `
      <div class="qa-item">
        <div class="qa-q">🙋 &ldquo;${esc(q)}&rdquo;</div>
        <div class="qa-a">📚 ${esc(a)}</div>
      </div>`).join('');

    const tagsHtml = (book.tags || []).map(t =>
      `<span class="tag">${esc(t)}</span>`).join('');

    const libBtnHtml = isbn
      ? `<button class="lib-btn" onclick="openLibSheet('${esc(isbn)}','${esc(book.title).replace(/'/g,"\\'")}')">🏛️ 도서관 대출 현황 확인</button>`
      : '';

    return `
      <div class="book-card${isBorrowed ? ' borrowed' : ''}" data-isbn="${esc(isbn)}" data-title="${esc(book.title)}">
        <div class="book-top">
          ${coverHtml}
          <div class="book-meta">
            ${badgeHtml}
            <div class="book-title">${esc(book.title)}</div>
            <div class="book-author">${esc(book.author)}</div>
          </div>
        </div>
        <div class="hook-sentence">&ldquo;${esc(book.hookSentence)}&rdquo;</div>
        <div class="qa-list">${qaHtml}</div>
        <div class="tag-list">${tagsHtml}</div>
        ${book.description ? `
        <button class="desc-toggle" aria-expanded="false">
          📄 책 소개 보기 <span class="desc-arrow">▼</span>
        </button>
        <div class="book-desc-content">${esc(book.description)}</div>` : ''}

          ${isBorrowed ? '✅ 내 대출 목록에 있음' : '📖 내 대출 목록에 추가'}
        </button>
      </div>`;
  }

  function renderSection(key, section) {

    return `

        ${booksHtml}

      <div class="library-cta">
        <a class="library-btn"
           href="https://lib.ice.go.kr/shintree/intro/search/index.do?menu_idx=285"
           target="_blank">
          <span>📚</span> 도서관에서 검색하기
        </a>
        <div class="library-btn-sub">신트리 도서관 · 인천 부평구</div>
      </div>

      <!-- 명언 (curator-note 대체) -->
      <div class="quote-card">
        <div class="quote-label">📖 이 주의 문장</div>
        <div class="quote-text">&ldquo;${esc(quote.text)}&rdquo;</div>
        ${quote.author ? `<div class="quote-author">— ${esc(quote.author)}</div>` : ''}
      </div>

      <!-- 푸터 -->
      <div class="footer">
        <div class="footer-date">📅 ${esc(data.publishDate)} · 신트리 도서관</div>
        <div class="footer-tags">${esc(data.hashtags)}</div>
      </div>`;

  }


  /* ── 바텀시트 공통 ────────────────────────────────── */
  function openSheet(backdropId, sheetId) {
    document.getElementById(backdropId).classList.add('open');
    document.getElementById(sheetId).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet(backdropId, sheetId) {
    document.getElementById(backdropId).classList.remove('open');
    document.getElementById(sheetId).classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('history-backdrop').addEventListener('click', () =>
    closeSheet('history-backdrop', 'history-sheet'));
  document.getElementById('lib-backdrop').addEventListener('click', () =>
    closeSheet('lib-backdrop', 'lib-sheet'));

  /* ── 히스토리 시트 ─────────────────────────────────── */
  async function openHistorySheet() {
    openSheet('history-backdrop', 'history-sheet');
    const body = document.getElementById('history-body');
    body.innerHTML = '<div style="color:#8B95A1;font-size:13px;text-align:center;padding:40px 0">불러오는 중...</div>';
    try {
      const res        = await fetch('/api/history');
      const { items }  = await res.json();
      if (!items?.length) {
        body.innerHTML = '<div style="color:#8B95A1;font-size:13px;text-align:center;padding:40px 0">저장된 큐레이션이 없어요</div>';
        return;
      }
      body.innerHTML = items.map(item => `
        <div class="history-item${currentVol === item.vol ? ' active' : ''}"
             onclick="loadHistoryItem('${esc(item.filename)}')">
          <div class="history-item-emoji">${esc(item.concept?.emoji || '📚')}</div>
          <div class="history-item-info">
            <div class="history-item-vol">${esc(item.vol)} · ${esc(item.publishDate)}</div>
            <div class="history-item-title">${esc(item.concept?.title || '')}</div>
            <div class="history-item-meta">책 ${item.bookCount}권${currentVol === item.vol ? ' · 현재 보기 중' : ''}</div>
          </div>
          <div class="history-item-arrow">›</div>
        </div>`).join('');
    } catch (err) {
      body.innerHTML = `<div style="color:#C53030;font-size:13px;text-align:center;padding:24px 0">불러오기 실패</div>`;
    }
  }

  async function loadHistoryItem(filename) {
    closeSheet('history-backdrop', 'history-sheet');
    document.getElementById('app').innerHTML = `
      <div class="loading"><div class="spinner"></div><div>불러오는 중...</div></div>`;
    try {
      const res  = await fetch(`/api/pool/${encodeURIComponent(filename)}`);
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const data = await res.json();
      renderApp(data);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="error-card">
          <div style="font-size:36px;margin-bottom:14px">😕</div>
          <strong>불러오지 못했어요</strong>
          <div style="margin-top:8px;font-size:13px;color:#718096">${esc(err.message)}</div>
          <button onclick="loadCuration()">현재 큐레이션으로 돌아가기</button>
        </div>`;
    }
  }

  /* ── 도서관 확인 시트 ──────────────────────────────── */
  async function openLibSheet(isbn13, title) {
    const body = document.getElementById('lib-sheet-body');
    const searchUrl = esc(SHINTREE_SEARCH + encodeURIComponent(title));

    body.innerHTML = `
      <div class="lib-check-row" style="padding-bottom:10px">
        <div class="lib-check-label" style="font-size:13px;color:#4E5968;font-weight:500">${esc(title)}</div>
      </div>
      <div class="lib-check-row" id="lib-status-row">
        <div class="lib-check-label">신트리 도서관 대출 현황</div>
        <div class="lib-check-status gray" id="lib-status-main" style="font-size:12px">확인 중…</div>
      </div>
      <a class="lib-sheet-cta" href="${searchUrl}" target="_blank" rel="noopener">
        📚 신트리 도서관에서 직접 검색하기
      </a>`;
    openSheet('lib-backdrop', 'lib-sheet');

    try {
      const res  = await fetch(`/api/availability?isbn13=${encodeURIComponent(isbn13)}`);
      const data = await res.json();
      const el   = document.getElementById('lib-status-main');
      if (!el) return;

      const REAL_STATUS = ['available', 'reserved', 'interlibrary'];
      if (REAL_STATUS.includes(data.status)) {
        const colorCls = { green:'green', yellow:'yellow', blue:'gray' };
        el.textContent = data.badge || '🔗 직접 확인';
        el.className   = `lib-check-status ${colorCls[data.color] || 'gray'}`;
      } else {
        // API 미승인·오류 → 솔직하게 안내
        const row = document.getElementById('lib-status-row');
        if (row) row.style.display = 'none';
        const note = document.createElement('div');
        note.style.cssText = 'font-size:12px;color:#8B95A1;text-align:center;padding:12px 0 4px;line-height:1.6';
        note.textContent = '실시간 조회가 어려워요. 아래 버튼으로 신트리 도서관에서 직접 확인해주세요.';
        body.insertBefore(note, body.querySelector('.lib-sheet-cta'));
      }
    } catch {
      const row = document.getElementById('lib-status-row');
      if (row) row.style.display = 'none';
    }
  }

  /* ── 데이터 로드 ──────────────────────────────────── */
  async function loadCuration() {
    document.getElementById('app').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>책 정보를 불러오는 중...</div>
      </div>`;
    try {
      const res = await fetch('/api/curation');
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const data = await res.json();
      renderApp(data);
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="error-card">
          <div style="font-size:36px;margin-bottom:14px">😕</div>
          <strong>큐레이션을 불러오지 못했어요</strong>
          <div style="margin-top:8px;font-size:13px;color:#718096">${esc(err.message)}</div>
          <button onclick="loadCuration()">다시 시도</button>
        </div>`;
    }
  }

  /* ── AI 토스트 헬퍼 ──────────────────────────────── */
  function showToast(msg, durationMs = 3000) {
    const t = document.getElementById('ai-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), durationMs);
  }

  /* ── 새로고침 ─────────────────────────────────────── */
  document.getElementById('fab').addEventListener('click', async () => {
    const fab  = document.getElementById('fab');
    fab.classList.add('spinning');
    fab.disabled = true;

    showToast('🔄 새 큐레이션 불러오는 중...', 8000);

    try {
      const res = await fetch('/api/refresh', { method: 'POST' });
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const data = await res.json();

      /* 서비스워커 /api/curation 캐시도 함께 삭제 */
      if ('caches' in window) {
        try {
          const cache = await caches.open('shintree-v1');
          await cache.delete('/api/curation');
        } catch { /* SW 미지원 환경 무시 */ }
      }

      renderApp(data);
      window.scrollTo({ top: 0, behavior: 'smooth' });

      showToast('📚 새 큐레이션으로 변경됐어요!', 3500);
    } catch (err) {
      showToast('❌ 새로고침 실패: ' + err.message, 4000);
    } finally {
      fab.classList.remove('spinning');
      fab.disabled = false;
    }
  });

  /* ── 초기 로드 ────────────────────────────────────── */
  loadCuration();
  </script>
</body>
</html>
